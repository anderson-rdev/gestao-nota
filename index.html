<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Média - Sistema de Notas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input[type="number"]:focus {
            border-color: #4CAF50;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        #resultado {
            margin-top: 30px;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }
        .aprovado {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .recuperacao {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        .reprovado {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .erro {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧮 Calculadora de Média</h1>
        
        <div class="input-group">
            <label for="nota1">Nota 1 (0 a 10):</label>
            <input type="number" id="nota1" min="0" max="10" step="0.1">
        </div>
        
        <div class="input-group">
            <label for="nota2">Nota 2 (0 a 10):</label>
            <input type="number" id="nota2" min="0" max="10" step="0.1">
        </div>
        
        <div class="input-group">
            <label for="nota3">Nota 3 (0 a 10):</label>
            <input type="number" id="nota3" min="0" max="10" step="0.1">
        </div>
        
        <button onclick="calcularMedia()">Calcular Média</button>
        
        <div id="resultado"></div>
    </div>

    <script>
        function calcularMedia() {
            // Captura as notas
            const nota1 = parseFloat(document.getElementById('nota1').value);
            const nota2 = parseFloat(document.getElementById('nota2').value);
            const nota3 = parseFloat(document.getElementById('nota3').value);
            
            const resultado = document.getElementById('resultado');
            
            // Validação: verifica se todos os campos foram preenchidos
            if (isNaN(nota1) || isNaN(nota2) || isNaN(nota3)) {
                mostrarResultado('❌ Preencha todas as três notas!', 'erro');
                return;
            }
            
            // Validação: verifica se as notas estão entre 0 e 10
            if (nota1 < 0 || nota1 > 10 || nota2 < 0 || nota2 > 10 || nota3 < 0 || nota3 > 10) {
                mostrarResultado('❌ As notas devem estar entre 0 e 10!', 'erro');
                return;
            }
            
            // Calcula a média
            const media = (nota1 + nota2 + nota3) / 3;
            
            // Exibe a média com 2 casas decimais
            const mediaFormatada = media.toFixed(2);
            
            // Determina o resultado usando ELSE IF
            let mensagem;
            let classe;
            
            if (media >= 7) {
                mensagem = `✅ Aprovado! Média: ${mediaFormatada}`;
                classe = 'aprovado';
            } else if (media >= 5) {
                mensagem = `⚠️ Recuperação. Média: ${mediaFormatada}`;
                classe = 'recuperacao';
            } else {
                mensagem = `❌ Reprovado. Média: ${mediaFormatada}`;
                classe = 'reprovado';
            }
            
            mostrarResultado(mensagem, classe);
        }
        
        function mostrarResultado(mensagem, classe) {
            const resultado = document.getElementById('resultado');
            resultado.textContent = mensagem;
            resultado.className = classe;
            resultado.style.display = 'block';
        }
        
        // Permite calcular com Enter
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calcularMedia();
            }
        });
    </script>
</body>
</html>
